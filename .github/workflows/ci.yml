name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run test:webui

      - run: npm run build:webui

      - run: npm run pack:dry-run
